openapi: 3.0.3
info:
  title: StealADeal Backend API
  version: 0.1.0
  description: |
    OpenAPI contract for the current H2-backed development backend.
    This spec reflects the implemented dealer, vehicle, lead, appointment,
    and dashboard endpoints.
servers:
  - url: http://localhost:8282
    description: Local development
tags:
  - name: Auth
  - name: Dealers
  - name: Vehicles
  - name: Leads
  - name: Appointments
  - name: Deals
  - name: Inbox
  - name: Portal
  - name: Tasks
  - name: Notifications
  - name: Dashboard
security:
  - bearerAuth: []
paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a buyer or dealer account
      operationId: registerAccount
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive an access token
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new access/refresh pair
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/dealers/{dealerId}/approve:
    post:
      tags: [Auth]
      summary: Admin approves a dealer
      operationId: adminApproveDealer
      parameters:
        - $ref: '#/components/parameters/DealerId'
      responses:
        '200':
          description: Dealer approved
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/dealers/{dealerId}/reject:
    post:
      tags: [Auth]
      summary: Admin rejects a dealer with a reason
      operationId: adminRejectDealer
      parameters:
        - $ref: '#/components/parameters/DealerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectDealerRequest'
      responses:
        '200':
          description: Dealer rejected
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers:
    get:
      tags: [Dealers]
      summary: List dealers
      operationId: listDealers
      security: []
      responses:
        '200':
          description: Dealers returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dealer'
    post:
      tags: [Dealers]
      summary: Create dealer
      operationId: createDealer
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDealerRequest'
      responses:
        '201':
          description: Dealer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dealer'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/dealers/{dealerId}:
    get:
      tags: [Dealers]
      summary: Get dealer by id
      operationId: getDealer
      security: []
      parameters:
        - $ref: '#/components/parameters/DealerId'
      responses:
        '200':
          description: Dealer returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dealer'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Dealers]
      summary: Update dealer details
      operationId: updateDealer
      parameters:
        - $ref: '#/components/parameters/DealerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealerRequest'
      responses:
        '200':
          description: Dealer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dealer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/approval:
    patch:
      tags: [Dealers]
      summary: Update dealer approval status
      operationId: updateDealerApproval
      parameters:
        - $ref: '#/components/parameters/DealerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealerApprovalRequest'
      responses:
        '200':
          description: Dealer approval updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dealer'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/inventory:
    get:
      tags: [Vehicles]
      summary: List inventory for a dealer
      operationId: listDealerInventory
      parameters:
        - $ref: '#/components/parameters/DealerId'
      responses:
        '200':
          description: Dealer inventory returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/inventory-upload:
    post:
      tags: [Vehicles]
      summary: Bulk upload inventory for a dealer
      operationId: uploadDealerInventory
      parameters:
        - $ref: '#/components/parameters/DealerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryUploadRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InventoryCsvUploadRequest'
      responses:
        '200':
          description: Inventory upload processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/vehicles:
    get:
      tags: [Vehicles]
      summary: List vehicles
      operationId: listVehicles
      security: []
      parameters:
        - in: query
          name: dealerId
          schema:
            type: integer
            format: int64
        - in: query
          name: make
          schema:
            type: string
            default: ""
        - in: query
          name: model
          schema:
            type: string
            default: ""
        - in: query
          name: minPrice
          schema:
            type: number
            format: double
            default: 0
        - in: query
          name: maxPrice
          schema:
            type: number
            format: double
            default: 9999999
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/VehicleStatus'
      responses:
        '200':
          description: Vehicles returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
    post:
      tags: [Vehicles]
      summary: Create vehicle
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVehicleRequest'
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/vehicles/{vehicleId}:
    get:
      tags: [Vehicles]
      summary: Get vehicle by id
      operationId: getVehicle
      security: []
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      responses:
        '200':
          description: Vehicle returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Vehicles]
      summary: Update vehicle
      operationId: updateVehicle
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVehicleRequest'
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/vehicles/{vehicleId}/leads:
    post:
      tags: [Leads]
      summary: Create lead for vehicle
      operationId: createLead
      security: []
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLeadRequest'
      responses:
        '201':
          description: Lead created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/leads:
    get:
      tags: [Leads]
      summary: List leads
      operationId: listLeads
      parameters:
        - in: query
          name: vehicleId
          schema:
            type: integer
            format: int64
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/LeadStatus'
      responses:
        '200':
          description: Leads returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lead'

  /api/leads/{leadId}/status:
    patch:
      tags: [Leads]
      summary: Update lead status
      operationId: updateLeadStatus
      parameters:
        - $ref: '#/components/parameters/LeadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLeadStatusRequest'
      responses:
        '200':
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/vehicles/{vehicleId}/appointments:
    post:
      tags: [Appointments]
      summary: Create appointment for vehicle
      operationId: createAppointment
      security: []
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '201':
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/appointments:
    get:
      tags: [Appointments]
      summary: List appointments
      operationId: listAppointments
      parameters:
        - in: query
          name: vehicleId
          schema:
            type: integer
            format: int64
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AppointmentStatus'
      responses:
        '200':
          description: Appointments returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'

  /api/appointments/{appointmentId}/status:
    patch:
      tags: [Appointments]
      summary: Update appointment status
      operationId: updateAppointmentStatus
      parameters:
        - $ref: '#/components/parameters/AppointmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAppointmentStatusRequest'
      responses:
        '200':
          description: Appointment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dashboard:
    get:
      tags: [Dashboard]
      summary: Get dashboard summary
      operationId: getDashboard
      responses:
        '200':
          description: Dashboard summary returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'

  /api/deals:
    get:
      tags: [Deals]
      summary: List deals
      operationId: listDeals
      parameters:
        - in: query
          name: vehicleId
          schema:
            type: integer
            format: int64
        - in: query
          name: stage
          schema:
            $ref: '#/components/schemas/DealStage'
      responses:
        '200':
          description: Deals returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deal'
    post:
      tags: [Deals]
      summary: Create a new deal
      operationId: createDeal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDealRequest'
      responses:
        '201':
          description: Deal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/deals/{dealId}:
    get:
      tags: [Deals]
      summary: Get deal by id
      operationId: getDeal
      parameters:
        - $ref: '#/components/parameters/DealId'
      responses:
        '200':
          description: Deal returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/deals/{dealId}/stage:
    patch:
      tags: [Deals]
      summary: Update deal stage
      operationId: updateDealStage
      parameters:
        - $ref: '#/components/parameters/DealId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealStageRequest'
      responses:
        '200':
          description: Deal updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/deals/{dealId}/deposit:
    post:
      tags: [Deals]
      summary: Simulate deposit payment
      operationId: payDealDeposit
      parameters:
        - $ref: '#/components/parameters/DealId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayDepositRequest'
      responses:
        '200':
          description: Deposit recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/deals/{dealId}/documents:
    get:
      tags: [Deals]
      summary: List deal documents
      operationId: listDealDocuments
      parameters:
        - $ref: '#/components/parameters/DealId'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/DocumentStatus'
      responses:
        '200':
          description: Deal documents returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DealDocument'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Deals]
      summary: Upload or register a deal document
      operationId: createDealDocument
      parameters:
        - $ref: '#/components/parameters/DealId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDealDocumentRequest'
      responses:
        '201':
          description: Document created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/deals/{dealId}/documents/{documentId}/status:
    patch:
      tags: [Deals]
      summary: Update deal document status
      operationId: updateDealDocumentStatus
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealDocumentStatusRequest'
      responses:
        '200':
          description: Document updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/deals/{dealId}/fulfillment:
    patch:
      tags: [Deals]
      summary: Schedule or update fulfillment for a deal
      operationId: updateDealFulfillment
      parameters:
        - $ref: '#/components/parameters/DealId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFulfillmentRequest'
      responses:
        '200':
          description: Fulfillment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/deals/{dealId}/activity:
    get:
      tags: [Deals]
      summary: List deal activity timeline
      operationId: listDealActivity
      parameters:
        - $ref: '#/components/parameters/DealId'
      responses:
        '200':
          description: Deal activity returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DealActivity'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/deals/{dealId}/readiness:
    get:
      tags: [Deals]
      summary: Get computed readiness and blockers for a deal
      operationId: getDealReadiness
      parameters:
        - $ref: '#/components/parameters/DealId'
      responses:
        '200':
          description: Deal readiness returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealReadiness'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/deals/{dealId}/tasks:
    get:
      tags: [Tasks]
      summary: List computed tasks for a deal
      operationId: listDealTasks
      parameters:
        - $ref: '#/components/parameters/DealId'
      responses:
        '200':
          description: Deal tasks returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DealTask'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/inbox/buyers/{buyerEmail}:
    get:
      tags: [Inbox]
      summary: Get buyer inbox
      operationId: getBuyerInbox
      parameters:
        - in: path
          name: buyerEmail
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Buyer inbox returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantInbox'

  /api/inbox/dealers/{dealerId}:
    get:
      tags: [Inbox]
      summary: Get dealer inbox
      operationId: getDealerInbox
      parameters:
        - $ref: '#/components/parameters/DealerId'
      responses:
        '200':
          description: Dealer inbox returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealerInbox'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/deal-queue:
    get:
      tags: [Inbox]
      summary: Get categorized dealer deal queue
      operationId: getDealerDealQueue
      parameters:
        - $ref: '#/components/parameters/DealerId'
      responses:
        '200':
          description: Dealer queue returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealerQueue'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/portal:
    get:
      tags: [Portal]
      summary: Get dealer portal overview and pipeline snapshot
      operationId: getDealerPortal
      parameters:
        - $ref: '#/components/parameters/DealerId'
      responses:
        '200':
          description: Dealer portal returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealerPortal'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/portal/deals:
    get:
      tags: [Portal]
      summary: List dealer portal deals
      operationId: listDealerPortalDeals
      parameters:
        - $ref: '#/components/parameters/DealerId'
        - in: query
          name: stage
          schema:
            $ref: '#/components/schemas/DealStage'
      responses:
        '200':
          description: Dealer portal deals returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortalDealItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/portal/leads:
    get:
      tags: [Portal]
      summary: List dealer portal leads
      operationId: listDealerPortalLeads
      parameters:
        - $ref: '#/components/parameters/DealerId'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/LeadStatus'
      responses:
        '200':
          description: Dealer portal leads returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortalLeadItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/portal/appointments:
    get:
      tags: [Portal]
      summary: List dealer portal appointments
      operationId: listDealerPortalAppointments
      parameters:
        - $ref: '#/components/parameters/DealerId'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AppointmentStatus'
      responses:
        '200':
          description: Dealer portal appointments returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortalAppointmentItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/portal/documents:
    get:
      tags: [Portal]
      summary: List dealer portal documents
      operationId: listDealerPortalDocuments
      parameters:
        - $ref: '#/components/parameters/DealerId'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/DocumentStatus'
      responses:
        '200':
          description: Dealer portal documents returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortalDocumentItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/portal/subscription:
    get:
      tags: [Portal]
      summary: Get dealer portal subscription
      operationId: getDealerPortalSubscription
      parameters:
        - $ref: '#/components/parameters/DealerId'
      responses:
        '200':
          description: Dealer portal subscription returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSubscription'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Portal]
      summary: Update dealer portal subscription
      operationId: updateDealerPortalSubscription
      parameters:
        - $ref: '#/components/parameters/DealerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubscriptionRequest'
      responses:
        '200':
          description: Dealer portal subscription updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSubscription'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dealers/{dealerId}/portal/invoices:
    get:
      tags: [Portal]
      summary: List dealer portal invoices
      operationId: listDealerPortalInvoices
      parameters:
        - $ref: '#/components/parameters/DealerId'
      responses:
        '200':
          description: Dealer portal invoices returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortalInvoice'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks:
    get:
      tags: [Tasks]
      summary: List tasks for a participant
      operationId: listTasksForAssignee
      parameters:
        - in: query
          name: assigneeType
          required: true
          schema:
            $ref: '#/components/schemas/ParticipantType'
        - in: query
          name: assigneeReference
          required: true
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/DealTaskStatus'
      responses:
        '200':
          description: Tasks returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DealTask'

  /api/tasks/{taskId}/status:
    patch:
      tags: [Tasks]
      summary: Update task status
      operationId: updateTaskStatus
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskStatusRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealTask'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications for a participant
      operationId: listNotifications
      parameters:
        - in: query
          name: recipientType
          required: true
          schema:
            $ref: '#/components/schemas/ParticipantType'
        - in: query
          name: recipientReference
          required: true
          schema:
            type: string
        - in: query
          name: unreadOnly
          schema:
            type: boolean
      responses:
        '200':
          description: Notifications returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

  /api/notifications/{notificationId}/read:
    patch:
      tags: [Notifications]
      summary: Mark notification as read
      operationId: markNotificationRead
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkNotificationReadRequest'
      responses:
        '200':
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/me/favorites:
    get:
      tags: [Buyer]
      summary: List the authenticated buyer's favorites (garage)
      operationId: listFavorites
      responses:
        '200':
          description: Favorites returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Favorite'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Buyer]
      summary: Add a vehicle to favorites (idempotent)
      operationId: addFavorite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFavoriteRequest'
      responses:
        '200':
          description: Vehicle was already favorited; existing row returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favorite'
        '201':
          description: Favorite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favorite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/me/favorites/{vehicleId}:
    delete:
      tags: [Buyer]
      summary: Remove a vehicle from favorites (idempotent)
      operationId: removeFavorite
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      responses:
        '204':
          description: Removed (or was not present)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/me/saved-searches:
    get:
      tags: [Buyer]
      summary: List the authenticated buyer's saved searches
      operationId: listSavedSearches
      responses:
        '200':
          description: Saved searches returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavedSearch'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Buyer]
      summary: Create a saved search
      operationId: createSavedSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavedSearchInput'
      responses:
        '201':
          description: Saved search created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedSearch'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/me/saved-searches/{id}:
    patch:
      tags: [Buyer]
      summary: Update a saved search
      operationId: updateSavedSearch
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavedSearchInput'
      responses:
        '200':
          description: Saved search updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedSearch'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Buyer]
      summary: Delete a saved search
      operationId: deleteSavedSearch
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Deleted (or was not present)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-token

  parameters:
    DealerId:
      in: path
      name: dealerId
      required: true
      schema:
        type: integer
        format: int64
    VehicleId:
      in: path
      name: vehicleId
      required: true
      schema:
        type: integer
        format: int64
    LeadId:
      in: path
      name: leadId
      required: true
      schema:
        type: integer
        format: int64
    AppointmentId:
      in: path
      name: appointmentId
      required: true
      schema:
        type: integer
        format: int64
    DealId:
      in: path
      name: dealId
      required: true
      schema:
        type: integer
        format: int64
    DocumentId:
      in: path
      name: documentId
      required: true
      schema:
        type: integer
        format: int64
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: integer
        format: int64
    NotificationId:
      in: path
      name: notificationId
      required: true
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user does not have access to the requested resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RegisterRequest:
      type: object
      required: [displayName, email, password, role]
      properties:
        displayName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          $ref: '#/components/schemas/UserRole'
        dealerId:
          type: integer
          format: int64

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RejectDealerRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    AuthResponse:
      type: object
      required: [token, refreshToken, expiresAt, userId, displayName, email, role]
      properties:
        token:
          type: string
          description: JWT access token (HS256, ~15m TTL)
        refreshToken:
          type: string
          description: Opaque rotating refresh token (~30d TTL)
        expiresAt:
          type: string
          format: date-time
        userId:
          type: integer
          format: int64
        displayName:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        dealerId:
          type: integer
          format: int64
          nullable: true

    CurrentUser:
      type: object
      required: [userId, displayName, email, role]
      properties:
        userId:
          type: integer
          format: int64
        displayName:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        dealerId:
          type: integer
          format: int64
          nullable: true

    Dealer:
      type: object
      required: [id, name, licenseNumber, city, state, approved]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        licenseNumber:
          type: string
        city:
          type: string
        state:
          type: string
        approved:
          type: boolean

    CreateDealerRequest:
      type: object
      required: [name, licenseNumber, city, state]
      properties:
        name:
          type: string
        licenseNumber:
          type: string
        city:
          type: string
        state:
          type: string
          pattern: '^[A-Za-z]{2}$'

    UpdateDealerRequest:
      allOf:
        - $ref: '#/components/schemas/CreateDealerRequest'

    UpdateDealerApprovalRequest:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean

    Vehicle:
      type: object
      required:
        - id
        - dealerId
        - dealerName
        - vin
        - modelYear
        - make
        - model
        - trim
        - primaryImageUrl
        - imageUrls
        - mileage
        - price
        - status
      properties:
        id:
          type: integer
          format: int64
        dealerId:
          type: integer
          format: int64
        dealerName:
          type: string
        vin:
          type: string
        modelYear:
          type: integer
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        primaryImageUrl:
          type: string
          format: uri
        imageUrls:
          type: array
          items:
            type: string
            format: uri
        mileage:
          type: integer
        price:
          type: number
          format: double
        status:
          $ref: '#/components/schemas/VehicleStatus'
        bodyType:
          $ref: '#/components/schemas/BodyType'
          nullable: true
        fuelType:
          $ref: '#/components/schemas/FuelType'
          nullable: true
        combinedMpg:
          type: integer
          nullable: true
        marketValueCents:
          type: integer
          format: int64
          nullable: true

    BodyType:
      type: string
      enum: [SEDAN, SUV, TRUCK, COUPE, HATCHBACK, VAN, CONVERTIBLE, WAGON, OTHER]

    FuelType:
      type: string
      enum: [GAS, HYBRID, PLUGIN_HYBRID, ELECTRIC, DIESEL, OTHER]

    CreateVehicleRequest:
      type: object
      required:
        - dealerId
        - vin
        - modelYear
        - make
        - model
        - trim
        - imageUrls
        - mileage
        - price
        - status
      properties:
        dealerId:
          type: integer
          format: int64
        vin:
          type: string
          pattern: '^[A-HJ-NPR-Z0-9]{17}$'
        modelYear:
          type: integer
          minimum: 1990
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        imageUrls:
          type: array
          minItems: 1
          items:
            type: string
            format: uri
        mileage:
          type: integer
          minimum: 0
        price:
          type: number
          format: double
          minimum: 0
        status:
          $ref: '#/components/schemas/VehicleStatus'
        bodyType:
          $ref: '#/components/schemas/BodyType'
          nullable: true
        fuelType:
          $ref: '#/components/schemas/FuelType'
          nullable: true
        combinedMpg:
          type: integer
          minimum: 0
          nullable: true
        marketValueCents:
          type: integer
          format: int64
          minimum: 0
          nullable: true

    InventoryUploadRequest:
      type: object
      required: [mode, vehicles]
      properties:
        mode:
          $ref: '#/components/schemas/InventoryUploadMode'
        vehicles:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/InventoryUploadVehicle'

    InventoryCsvUploadRequest:
      type: object
      required: [mode, file]
      description: |
        CSV upload request. The CSV file must include the columns:
        vin, modelYear, make, model, trim, imageUrls, mileage, price, status.
        Multiple image URLs should be pipe-delimited inside the imageUrls column.
      properties:
        mode:
          $ref: '#/components/schemas/InventoryUploadMode'
        file:
          type: string
          format: binary

    InventoryUploadVehicle:
      type: object
      required:
        - vin
        - modelYear
        - make
        - model
        - trim
        - imageUrls
        - mileage
        - price
        - status
      properties:
        vin:
          type: string
          pattern: '^[A-HJ-NPR-Z0-9]{17}$'
        modelYear:
          type: integer
          minimum: 1990
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        imageUrls:
          type: array
          minItems: 1
          items:
            type: string
            format: uri
        mileage:
          type: integer
          minimum: 0
        price:
          type: number
          format: double
          minimum: 0
        status:
          $ref: '#/components/schemas/VehicleStatus'
        bodyType:
          $ref: '#/components/schemas/BodyType'
          nullable: true
        fuelType:
          $ref: '#/components/schemas/FuelType'
          nullable: true
        combinedMpg:
          type: integer
          minimum: 0
          nullable: true
        marketValueCents:
          type: integer
          format: int64
          minimum: 0
          nullable: true

    InventoryUploadResponse:
      type: object
      required: [dealerId, dealerName, mode, totalRows, createdCount, updatedCount, rejectedCount, rows]
      properties:
        dealerId:
          type: integer
          format: int64
        dealerName:
          type: string
        mode:
          $ref: '#/components/schemas/InventoryUploadMode'
        totalRows:
          type: integer
        createdCount:
          type: integer
        updatedCount:
          type: integer
        rejectedCount:
          type: integer
        rows:
          type: array
          items:
            $ref: '#/components/schemas/InventoryUploadRow'

    InventoryUploadRow:
      type: object
      required: [rowNumber, vin, status, message]
      properties:
        rowNumber:
          type: integer
        vin:
          type: string
        status:
          $ref: '#/components/schemas/InventoryUploadRowStatus'
        vehicleId:
          type: integer
          format: int64
          nullable: true
        message:
          type: string

    Lead:
      type: object
      required:
        - id
        - vehicleId
        - buyerName
        - buyerEmail
        - buyerPhone
        - message
        - status
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        vehicleId:
          type: integer
          format: int64
        buyerName:
          type: string
        buyerEmail:
          type: string
          format: email
        buyerPhone:
          type: string
        message:
          type: string
        status:
          $ref: '#/components/schemas/LeadStatus'
        createdAt:
          type: string
          format: date-time

    CreateLeadRequest:
      type: object
      required: [buyerName, buyerEmail, buyerPhone, message]
      properties:
        buyerName:
          type: string
        buyerEmail:
          type: string
          format: email
        buyerPhone:
          type: string
        message:
          type: string

    UpdateLeadStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/LeadStatus'

    Appointment:
      type: object
      required:
        - id
        - vehicleId
        - buyerName
        - buyerEmail
        - type
        - status
        - scheduledAt
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        vehicleId:
          type: integer
          format: int64
        buyerName:
          type: string
        buyerEmail:
          type: string
          format: email
        type:
          $ref: '#/components/schemas/AppointmentType'
        status:
          $ref: '#/components/schemas/AppointmentStatus'
        scheduledAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    CreateAppointmentRequest:
      type: object
      required: [buyerName, buyerEmail, type, scheduledAt]
      properties:
        buyerName:
          type: string
        buyerEmail:
          type: string
          format: email
        type:
          $ref: '#/components/schemas/AppointmentType'
        scheduledAt:
          type: string
          format: date-time

    UpdateAppointmentStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/AppointmentStatus'

    Dashboard:
      type: object
      required:
        - dealerCount
        - vehicleCount
        - liveVehicleCount
        - newLeadCount
        - requestedAppointmentCount
      properties:
        dealerCount:
          type: integer
          format: int64
        vehicleCount:
          type: integer
          format: int64
        liveVehicleCount:
          type: integer
          format: int64
        newLeadCount:
          type: integer
          format: int64
        requestedAppointmentCount:
          type: integer
          format: int64

    Deal:
      type: object
      required:
        - id
        - vehicleId
        - vehicleTitle
        - buyerName
        - buyerEmail
        - buyerPhone
        - buyerAddressLine1
        - buyerCity
        - buyerState
        - buyerPostalCode
        - fulfillmentType
        - tradeIn
        - tradeInOffer
        - vehiclePrice
        - taxAmount
        - registrationFee
        - documentationFee
        - deliveryFee
        - discountAmount
        - depositAmount
        - depositPaid
        - totalAmount
        - stage
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        vehicleId:
          type: integer
          format: int64
        vehicleTitle:
          type: string
        buyerName:
          type: string
        buyerEmail:
          type: string
          format: email
        buyerPhone:
          type: string
        buyerAddressLine1:
          type: string
        buyerAddressLine2:
          type: string
          nullable: true
        buyerCity:
          type: string
        buyerState:
          type: string
        buyerPostalCode:
          type: string
        fulfillmentType:
          $ref: '#/components/schemas/FulfillmentType'
        fulfillmentStatus:
          $ref: '#/components/schemas/FulfillmentStatus'
        fulfillmentScheduledAt:
          type: string
          format: date-time
          nullable: true
        fulfillmentLocation:
          type: string
          nullable: true
        fulfillmentNotes:
          type: string
          nullable: true
        tradeIn:
          type: boolean
        tradeInVin:
          type: string
          nullable: true
        tradeInMileage:
          type: integer
          nullable: true
        tradeInOffer:
          type: number
          format: double
        vehiclePrice:
          type: number
          format: double
        taxAmount:
          type: number
          format: double
        registrationFee:
          type: number
          format: double
        documentationFee:
          type: number
          format: double
        deliveryFee:
          type: number
          format: double
        discountAmount:
          type: number
          format: double
        depositAmount:
          type: number
          format: double
        depositPaid:
          type: boolean
        totalAmount:
          type: number
          format: double
        stage:
          $ref: '#/components/schemas/DealStage'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateDealRequest:
      type: object
      required:
        - vehicleId
        - buyerName
        - buyerEmail
        - buyerPhone
        - buyerAddressLine1
        - buyerCity
        - buyerState
        - buyerPostalCode
        - fulfillmentType
        - tradeIn
        - tradeInOffer
        - deliveryFee
        - discountAmount
      properties:
        vehicleId:
          type: integer
          format: int64
        buyerName:
          type: string
        buyerEmail:
          type: string
          format: email
        buyerPhone:
          type: string
        buyerAddressLine1:
          type: string
        buyerAddressLine2:
          type: string
          nullable: true
        buyerCity:
          type: string
        buyerState:
          type: string
          pattern: '^[A-Za-z]{2}$'
        buyerPostalCode:
          type: string
          pattern: '^[0-9]{5}(-[0-9]{4})?$'
        fulfillmentType:
          $ref: '#/components/schemas/FulfillmentType'
        tradeIn:
          type: boolean
        tradeInVin:
          type: string
          pattern: '^[A-HJ-NPR-Z0-9]{17}$'
          nullable: true
        tradeInMileage:
          type: integer
          minimum: 0
          nullable: true
        tradeInOffer:
          type: number
          format: double
          minimum: 0
        deliveryFee:
          type: number
          format: double
          minimum: 0
        discountAmount:
          type: number
          format: double
          minimum: 0

    UpdateDealStageRequest:
      type: object
      required: [stage]
      properties:
        stage:
          $ref: '#/components/schemas/DealStage'

    PayDepositRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          format: double
          minimum: 0

    DealDocument:
