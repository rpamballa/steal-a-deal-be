spring:
  datasource:
    url: jdbc:h2:mem:stealadeal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true

server:
  port: 8282
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  auth:
    bootstrap-admin-email: admin@stealadeal.local
    bootstrap-admin-password: Admin123!
    token-ttl-hours: 24
    jwt-secret: ${JWT_SECRET:}
    access-ttl-minutes: 15
    refresh-ttl-days: 30
  seed:
    demo:
      # Demo dealers/vehicles/users for local dev. MUST be false in
      # production (application-prod.yml sets it) so demo accounts with
      # known passwords are never written to a real database.
      enabled: true
    stress:
      # Opt-in load-test data. Off by default. Enable to provision a
      # dedicated "Stress Test Motors" dealer + N synthetic listings.
      enabled: false
      vehicle-count: 100
  storage:
    vehicle-images:
      # Car photos. Local filesystem by default; swap to an S3/CDN
      # adapter via provider=s3. Hard cap of 10 photos per listing.
      provider: local
      root: var/vehicle-images
      max-bytes: 8388608
      max-per-listing: 10
