spring:
  datasource:
    url: jdbc:h2:mem:stealadeal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true

server:
  port: 8282
  error:
    include-message: always

app:
  auth:
    bootstrap-admin-email: admin@stealadeal.local
    bootstrap-admin-password: Admin123!
    token-ttl-hours: 24
