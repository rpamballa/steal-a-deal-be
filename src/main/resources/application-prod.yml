spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/stealadeal}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:stealadeal}
    password: ${DATABASE_PASSWORD:stealadeal}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_MAX:20}
      minimum-idle: ${DATABASE_POOL_MIN:5}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration
  h2:
    console:
      enabled: false

server:
  port: ${SERVER_PORT:8282}
  error:
    include-message: never
    include-stacktrace: never

app:
  auth:
    bootstrap-admin-email: ${BOOTSTRAP_ADMIN_EMAIL:admin@stealadeal.local}
    bootstrap-admin-password: ${BOOTSTRAP_ADMIN_PASSWORD}
    token-ttl-hours: ${AUTH_TOKEN_TTL_HOURS:24}
  cors:
    # Comma-separated; Spring relaxed-binds to the List. Lock to the
    # real frontend origin(s) before go-live.
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:https://stealadeal.io}
  billing:
    # Defaults to stub even in prod until real keys are provisioned.
    # Set BILLING_PROVIDER=stripe and supply the keys ONLY via the
    # secrets manager — never commit key values.
    provider: ${BILLING_PROVIDER:stub}
    stripe-api-key: ${STRIPE_API_KEY:}
    stripe-webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  esign:
    # Self-hosted DocuSeal. Defaults to stub until provisioned. Set
    # ESIGN_PROVIDER=docuseal and supply base URL + token ONLY via the
    # secrets manager — never commit them.
    provider: ${ESIGN_PROVIDER:stub}
    docuseal-base-url: ${DOCUSEAL_BASE_URL:}
    docuseal-api-token: ${DOCUSEAL_API_TOKEN:}
    docuseal-webhook-secret: ${DOCUSEAL_WEBHOOK_SECRET:}
    # Free DocuSeal has no API to push a per-deal PDF, so signing uses
    # a fixed template built in the DocuSeal UI; this is its id.
    docuseal-template-id: ${DOCUSEAL_TEMPLATE_ID:}
  seed:
    demo:
      # Never seed demo accounts/data into a production database.
      enabled: false
