spring:
  datasource:
    # Unique in-memory DB per Spring context so test classes (and
    # DirtiesContext rebuilds) never share state. The default named
    # DB in application.yml (DB_CLOSE_DELAY=-1) is JVM-shared, which
    # made absolute-count assertions order-dependent and flaky.
    url: jdbc:h2:mem:test-${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

app:
  auth:
    # Lift the /api/auth rate limit for the suite (it makes far more
    # than 5 auth calls/min from 127.0.0.1). Prod default is 5.
    rate-limit-per-minute: 100000
  notifications:
    # Keep the scheduled outbox poller from firing mid-suite; tests
    # drive NotificationOutboxProcessor.drainOutbox() explicitly.
    outbox-poll-ms: 3600000
    max-dispatch-attempts: 3
  onboarding:
    # Pin the scheduler far out; tests drive evaluation explicitly.
    # stale-hours 0 = nudge a stuck dealer on the first evaluation.
    poll-ms: 3600000
    stale-hours: 0
    max-nudges-per-stage: 1
  inventory:
    feed:
      # Pin the feed scheduler; tests trigger sync explicitly.
      poll-ms: 3600000
    reaper:
      # Pin the reaper scheduler; tests trigger runOnce() explicitly.
      poll-ms: 3600000
      stale-days: 30
  storage:
    documents:
      provider: local
      root: ${java.io.tmpdir}/stealadeal-tests/documents
      max-bytes: 5242880
    vehicle-images:
      provider: local
      root: ${java.io.tmpdir}/stealadeal-tests/vehicle-images
      max-bytes: 5242880
      max-per-listing: 10
