services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stealadeal
      POSTGRES_USER: stealadeal
      POSTGRES_PASSWORD: stealadeal
    ports:
      - "5432:5432"
    volumes:
      - stealadeal-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stealadeal -d stealadeal"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/stealadeal
      DATABASE_USERNAME: stealadeal
      DATABASE_PASSWORD: stealadeal
      BOOTSTRAP_ADMIN_PASSWORD: Admin123!
    ports:
      - "8282:8282"

volumes:
  stealadeal-pg:
